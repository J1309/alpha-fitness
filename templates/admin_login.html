<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Alpha Fitness</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #080808 0%, #0f0f0f 100%);
    }
    .login-container {
      background: #141414;
      border: 1px solid rgba(255, 0, 51, 0.3);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-container h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .login-container p {
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      text-align: left;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 0, 51, 0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: #ff0033;
      box-shadow: 0 0 0 3px rgba(255, 0, 51, 0.2);
    }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ff0033, #cc0029);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 0, 51, 0.5);
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }
    .back-link:hover {
      color: #ff0033;
    }
    .logo-icon {
      font-size: 3rem;
      color: #ff0033;
      margin-bottom: 20px;
    }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    .alert.error {
      background: rgba(255, 0, 51, 0.2);
      border: 1px solid rgba(255, 0, 51, 0.5);
      color: #ff6666;
    }
    .alert.success {
      background: rgba(0, 128, 0, 0.2);
      border: 1px solid rgba(0, 255, 0, 0.5);
      color: #66ff66;
    }
    .alert.info {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ccc;
    }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  
  <div class="login-container">
    <div class="logo-icon">💪</div>
    <h1>Alpha Fitness</h1>
    <p>Admin Dashboard Login</p>
    
    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter admin password" required>
      </div>
      <button type="submit" class="submit-btn">Login</button>
    </form>
    
    <a href="{{ url_for('home') }}" class="back-link">← Back to Website</a>
  </div>
</body>
</html>
